[package]
name = "mathjax-svg-rs"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/sevenc-nanashi/mathjax-svg-rs"
license = "MIT"
description = "Very thin wrapper around MathJax to render TeX to SVG, using QuickJS-ng as the JavaScript engine."

[dependencies]
include-zstd = "0.1.0"
log = "0.4.29"
quickjs-rusty = "0.11.1"
serde_json = "1.0.149"

[dev-dependencies]
env_logger = "0.11.10"
resvg = "0.47.0"
